!======================================================================
! CORE-R2 — Standby Core Router (TechCom Network)
!======================================================================
! Role      : HSRP Standby, BGP peer with ISP, NAT/PAT gateway
! Interfaces :
!   Gi0/0  → DIST-SW1  (10.10.255.6/30, NAT inside)
!   Gi0/1  → DIST-SW2  (10.10.255.14/30, NAT inside)
!   Se0/0/0 → ISP      (200.100.50.1/30, NAT outside)
! Routing   : OSPF area 0, default-information originate
!======================================================================

enable secret core-r2
!
hostname CORE-R2
username Ayman privilege 15 secret ayman@2025
ip domain-name TechCom.local
ip ssh version 2
crypto key generate rsa modulus 1024
!
! --- Interfaces ---
interface GigabitEthernet0/0
 description LINK to DIST-SW1
 ip address 10.10.255.6 255.255.255.252
 ip nat inside
 duplex auto
 speed auto
 no shutdown
!
interface GigabitEthernet0/1
 description LINK to DIST-SW2
 ip address 10.10.255.14 255.255.255.252
 ip nat inside
 duplex auto
 speed auto
 no shutdown
!
interface Serial0/0/0
 description LINK to ISP
 ip address 200.100.50.1 255.255.255.252
 ip nat outside
 clock rate 2000000
 no shutdown
!
! --- OSPF ---
router ospf 1
 router-id 10.0.0.2
 log-adjacency-changes
 passive-interface default
 no passive-interface GigabitEthernet0/0
 no passive-interface GigabitEthernet0/1
 network 10.10.255.6  0.0.0.0 area 0
 network 10.10.255.14 0.0.0.0 area 0
 default-information originate
!
! --- NAT / PAT ---
ip nat inside source list 1 interface Serial0/0/0 overload
access-list 1 permit 10.10.0.0 0.0.255.255
ip route 0.0.0.0 0.0.0.0 Serial0/0/0
!
! --- Line security ---
line con 0
 exec-timeout 5 0
 password 7 08701E1D5D4C
 logging synchronous
 login
line vty 0 4
 exec-timeout 5 0
 logging synchronous
 login local
 transport input ssh
line vty 5 15
 exec-timeout 5 0
 logging synchronous
 login local
 transport input ssh
!
end
write memory
