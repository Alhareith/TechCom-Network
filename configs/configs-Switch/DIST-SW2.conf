!======================================================================
! DIST-SW2 — Backup Distribution / L3 Switch (HSRP Standby)
!======================================================================
! Role     : HSRP Standby for every VLAN gateway
! Uplinks  :
!   Gi1/0/23 → CORE-R2 (10.10.255.9/30)
!   Gi1/0/24 → CORE-R1 (10.10.255.13/30)
!======================================================================

enable secret dist-sw1
!
hostname DIST-SW2
username Ayman privilege 15 secret ayman@2025
ip domain-name TechCom.local
ip ssh version 2
ip routing
spanning-tree mode pvst
!
! --- Trunk to access switches ---
interface range GigabitEthernet1/0/1-21
 description TRUNK to ACCESS-SWITCHES
 switchport trunk native vlan 100
 switchport trunk allowed vlan 10,20,30,40,50,60,99,150
 switchport mode trunk
!
! --- L3 uplinks ---
interface GigabitEthernet1/0/23
 no switchport
 ip address 10.10.255.9 255.255.255.252
 duplex auto
 speed auto
!
interface GigabitEthernet1/0/24
 no switchport
 ip address 10.10.255.13 255.255.255.252
 duplex auto
 speed auto
!
! --- SVIs (HSRP Standby — default priority 100, lower than DIST-SW1) ---
interface Vlan10
 description Gateway for Management
 mac-address 00d0.bc26.9401
 ip address 10.10.10.3 255.255.255.0
 standby 10 ip 10.10.10.1
 standby 10 preempt
!
interface Vlan20
 description Gateway for IT
 mac-address 00d0.bc26.9402
 ip address 10.10.20.3 255.255.255.0
 standby 20 ip 10.10.20.1
 standby 20 preempt
!
interface Vlan30
 description Gateway for Support
 mac-address 00d0.bc26.9403
 ip address 10.10.30.3 255.255.255.0
 ip helper-address 10.10.99.10
 standby 30 ip 10.10.30.1
 standby 30 preempt
!
interface Vlan40
 description Gateway for Finance
 mac-address 00d0.bc26.9404
 ip address 10.10.40.3 255.255.255.0
 standby 40 ip 10.10.40.1
 standby 40 preempt
!
interface Vlan50
 description Gateway for HR
 mac-address 00d0.bc26.9405
 ip address 10.10.50.3 255.255.255.0
 standby 50 ip 10.10.50.1
 standby 50 preempt
!
interface Vlan60
 description Gateway for Sales
 mac-address 00d0.bc26.9406
 ip address 10.10.60.3 255.255.255.0
 standby 60 ip 10.10.60.1
 standby 60 preempt
!
interface Vlan99
 description Gateway for Mgmt
 mac-address 00d0.bc26.9407
 ip address 10.10.99.3 255.255.255.0
 standby 99 ip 10.10.99.1
 standby 99 priority 90
 standby 99 preempt
!
interface Vlan150
 description Gateway for Voice
 mac-address 00d0.bc26.9408
 ip address 10.10.150.3 255.255.255.0
 standby 150 ip 10.10.150.1
 standby 150 preempt
!
! --- OSPF ---
router ospf 1
 log-adjacency-changes
 passive-interface default
 no passive-interface GigabitEthernet1/0/23
 no passive-interface GigabitEthernet1/0/24
 network 10.10.0.0 0.0.255.255 area 0
!
ip route 0.0.0.0 0.0.0.0 10.10.255.14
ip route 0.0.0.0 0.0.0.0 10.10.255.6
!
! --- Line security ---
line con 0
 password 7 08701E1D5D4C
 login
 exec-timeout 5 0
 logging synchronous
line vty 0 4
 login local
 transport input ssh
 exec-timeout 5 0
 logging synchronous
line vty 5 15
 login local
 transport input ssh
 exec-timeout 5 0
 logging synchronous
!
end
write memory
