!======================================================================
! DIST-SW1 — Primary Distribution / L3 Switch (HSRP Active)
!======================================================================
! Role     : HSRP Active for every VLAN gateway, L3 inter-VLAN routing
! Uplinks  :
!   Gi0/1 → CORE-R1 (10.10.255.1/30)
!   Gi0/2 → CORE-R2 (10.10.255.5/30)
! SVIs     : VLAN 10,20,30,40,50,60,99,150 (HSRP priority 110)
!======================================================================

enable secret dist-sw1
!
hostname DIST-SW1
username Ayman privilege 15 secret ayman@2025
ip domain-name TechCom.local
ip ssh version 2
ip routing
spanning-tree mode pvst
!
! --- Trunk to access switches ---
interface range FastEthernet0/1-24
 description Trunk to ACCESS-SWITCHES
 switchport trunk native vlan 100
 switchport trunk allowed vlan 10,20,30,40,50,60,99,150
 switchport trunk encapsulation dot1q
 switchport mode trunk
!
! --- L3 uplinks to core routers ---
interface GigabitEthernet0/1
 no switchport
 ip address 10.10.255.1 255.255.255.252
 duplex auto
 speed auto
!
interface GigabitEthernet0/2
 no switchport
 ip address 10.10.255.5 255.255.255.252
 duplex auto
 speed auto
!
! --- SVIs with HSRP (Active) ---
interface Vlan10
 description Gateway for Management
 mac-address 0002.1623.4d01
 ip address 10.10.10.2 255.255.255.0
 standby 10 ip 10.10.10.1
 standby 10 priority 110
 standby 10 preempt
!
interface Vlan20
 description Gateway for IT
 mac-address 0002.1623.4d02
 ip address 10.10.20.2 255.255.255.0
 standby 20 ip 10.10.20.1
 standby 20 priority 110
 standby 20 preempt
!
interface Vlan30
 description Gateway for Support
 mac-address 0002.1623.4d03
 ip address 10.10.30.2 255.255.255.0
 standby 30 ip 10.10.30.1
 standby 30 priority 110
 standby 30 preempt
!
interface Vlan40
 description Gateway for Finance
 mac-address 0002.1623.4d04
 ip address 10.10.40.2 255.255.255.0
 standby 40 ip 10.10.40.1
 standby 40 priority 110
 standby 40 preempt
!
interface Vlan50
 description Gateway for HR
 mac-address 0002.1623.4d05
 ip address 10.10.50.2 255.255.255.0
 standby 50 ip 10.10.50.1
 standby 50 priority 110
 standby 50 preempt
!
interface Vlan60
 description Gateway for Sales
 mac-address 0002.1623.4d06
 ip address 10.10.60.2 255.255.255.0
 standby 60 ip 10.10.60.1
 standby 60 priority 110
 standby 60 preempt
!
interface Vlan99
 description Gateway for Management
 mac-address 0002.1623.4d07
 ip address 10.10.99.2 255.255.255.0
 standby 99 ip 10.10.99.1
 standby 99 priority 110
 standby 99 preempt
!
interface Vlan150
 description Gateway for Voice (VoIP)
 mac-address 0002.1623.4d09
 ip address 10.10.150.2 255.255.255.0
 standby 150 ip 10.10.150.1
 standby 150 priority 110
 standby 150 preempt
!
! --- OSPF ---
router ospf 1
 router-id 1.1.1.1
 log-adjacency-changes
 passive-interface default
 no passive-interface GigabitEthernet0/1
 no passive-interface GigabitEthernet0/2
 network 10.10.0.0 0.0.255.255 area 0
!
ip route 0.0.0.0 0.0.0.0 10.10.255.2
ip route 0.0.0.0 0.0.0.0 10.10.255.10 10
!
! --- Line security ---
line con 0
 password 7 08701E1D5D4C
 login
 exec-timeout 5 0
 logging synchronous
line vty 0 4
 login local
 transport input ssh
 exec-timeout 5 0
 logging synchronous
line vty 5 15
 login local
 transport input ssh
 exec-timeout 5 0
 logging synchronous
!
end
write memory
