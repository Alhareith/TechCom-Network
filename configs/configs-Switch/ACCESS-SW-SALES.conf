!======================================================================
! ACCESS-SW-SALES — Sales Department Access Switch
!======================================================================
! Data VLAN : 60 (Sales)
! Voice VLAN: 150
! QoS-ready : bandwidth and voice priority on VoIP traffic
!======================================================================

enable secret 12345
!
hostname ACCESS-SW-SALES
username Hareth secret hareth@2025
ip domain-name telecom.local
spanning-tree mode pvst
spanning-tree extend system-id
!
interface Port-channel1
 description UPLINK to DISTRIBUTION Layer
 switchport trunk native vlan 100
 switchport trunk allowed vlan 60,150
 switchport mode trunk
!
interface range FastEthernet0/1-22
 description Port for Sales Department
 switchport access vlan 60
 switchport mode access
 switchport voice vlan 150
 spanning-tree portfast
 spanning-tree bpduguard enable
!
interface FastEthernet0/23
 description UPLINK-to-DIST-SW1
 switchport trunk native vlan 100
 switchport trunk allowed vlan 60,150
 switchport mode trunk
 spanning-tree portfast
 spanning-tree bpduguard enable
!
interface FastEthernet0/24
 description UPLINK-to-DIST-SW2
 switchport trunk native vlan 100
 switchport trunk allowed vlan 60,150
 switchport mode trunk
 spanning-tree portfast
 spanning-tree bpduguard enable
!
interface GigabitEthernet0/1
 description UPLINK to DISTRIBUTION Layer
 switchport trunk native vlan 100
 switchport trunk allowed vlan 60,150
 switchport mode trunk
 channel-group 1 mode active
!
interface GigabitEthernet0/2
 description UPLINK to DISTRIBUTION Layer
 switchport trunk native vlan 100
 switchport trunk allowed vlan 60,150
 switchport mode trunk
 channel-group 1 mode active
!
interface Vlan1
 no ip address
 shutdown
!
interface Vlan60
 ip address 10.10.60.254 255.255.255.0
!
ip default-gateway 10.10.60.1
!
line con 0
 password cisco
 login
line vty 0 4
 password cisco
 login
line vty 5 15
 password cisco
 login
!
end
write memory
