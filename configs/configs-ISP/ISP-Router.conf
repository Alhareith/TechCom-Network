!======================================================================
! ISP Router — External Gateway (TechCom Network)
!======================================================================
! Role      : Simulated Internet / ISP edge router
! Interfaces : Gi0/0 (to Internet)  +  Se0/0/0 (to CORE-R2)
!              Se0/0/1 (to CORE-R1)
! Notes     : Provides only static routes into the customer network.
!             No NAT or dynamic routing runs on this device — it acts
!             as a stable traffic sink/source for the lab.
!======================================================================

enable secret isp@2025
!
hostname ISP-Router
ip domain-name isp.net
spanning-tree mode pvst
!
interface GigabitEthernet0/0
 description Connection to INTERNET
 ip address 8.8.8.1 255.255.255.0
 duplex auto
 speed auto
 no shutdown
!
interface Serial0/0/0
 description LINK to TechCom Company - CORE-R2
 ip address 200.100.50.2 255.255.255.252
 clock rate 64000
 no shutdown
!
interface Serial0/0/1
 description LINK to TechCom Company - CORE-R1
 ip address 200.100.50.6 255.255.255.252
 clock rate 64000
 no shutdown
!
! --- Static routes into customer space (equal-cost) ---
ip route 10.10.0.0 255.255.0.0 200.100.50.1
ip route 10.10.0.0 255.255.0.0 200.100.50.5
ip route 0.0.0.0   0.0.0.0   GigabitEthernet0/0
!
line con 0
 login
line vty 0 4
 login
!
end
write memory
